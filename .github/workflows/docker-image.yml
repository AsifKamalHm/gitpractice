name: Docker Image CI

on:
  workflow_dispatch:
  push:
    

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build --tag cloud-with-asif:v1 .
    - name: run container
      run: |
        docker run -d  -p 5000:5000  cloud-with-asif:v1
        sleep 5
        docker ps
