name: Docker Image CI

on:
  workflow_dispatch:
  push:
    

jobs:

  flask-ci-job:

    runs-on: ubuntu-latest

    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.TOKEN }}

    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build --tag cloud-with-asif:v1 .
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/cloud-with-asif:v1
  run-docker-container:
    runs-on: ubuntu-latest
    needs: flask-ci-job
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.TOKEN }}
    - name: run container
      run: |
        docker run -d -p 5000:5000  cloud-with-asif:v1
        sleep 5
        docker ps
    - name: test the deployement
      run: curl http://localhost:5000
